<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeBaby Pro — Offline</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0A0A0F; color:#F0EEE8; font-family:'Segoe UI',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
  .wrap { text-align:center; max-width:320px; }
  .logo { font-size:72px; margin-bottom:20px; }
  h1 { font-size:24px; color:#C9A84C; margin-bottom:8px; }
  p { font-size:14px; color:#9B9891; line-height:1.6; margin-bottom:24px; }
  button { background:linear-gradient(135deg,#C9A84C,#7A6330); color:#0A0A0F; border:none; padding:14px 28px; border-radius:12px; font-size:15px; font-weight:700; cursor:pointer; }
  .tip { font-size:12px; color:#5A5855; margin-top:16px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">📈</div>
  <h1>TradeBaby Pro</h1>
  <p>You're offline. The app should load from cache automatically. If it doesn't, tap Reload below.</p>
  <button onclick="window.location.href='./index.html'">Open TradeBaby</button>
  <p class="tip">Once loaded, TradeBaby works completely offline.<br>All your data is stored on your device.</p>
</div>
</body>
</html>
